services:
  db:
    image: postgres:16
    container_name: stg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stg
    ports:
      - "5432:5432"
    volumes:
      - stg_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: stg_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - stg_redisdata:/data

volumes:
  stg_pgdata:
  stg_redisdata: